<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e6c9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a5d6a7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff176;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcdd2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef9a9a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="#f5f5f5" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="25" width="800" height="25" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="bold">结构化剪枝 → ONNX 导出 → 推理部署 兼容性检查清单</text>
  <!-- Stage 1: Shape Check -->
  <rect x="30" y="70" width="340" height="60" rx="6" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="200" y="93" text-anchor="middle" fill="#2e7d32" font-size="14" font-weight="bold">✅ Stage 1: 形状一致性检查</text>
  <text x="200" y="115" text-anchor="middle" fill="#333" font-size="11">对比剪枝前后每层输出的 shape 是否一致（尤其是 Residual 连接处）</text>
  <!-- Stage 2: Export Check -->
  <rect x="430" y="70" width="340" height="60" rx="6" fill="url(#warnGrad)" filter="url(#shadow)"/>
  <text x="600" y="93" text-anchor="middle" fill="#f57f17" font-size="14" font-weight="bold">⚠️ Stage 2: ONNX 导出检查</text>
  <text x="600" y="115" text-anchor="middle" fill="#333" font-size="11">torch.onnx.export 是否能通过？有无不支持的动态控制流？</text>
  <!-- Arrow 1→2 -->
  <line x1="370" y1="100" x2="430" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#666"/></marker></defs>
  <!-- Stage 3: onnxsim -->
  <rect x="30" y="155" width="340" height="60" rx="6" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="200" y="178" text-anchor="middle" fill="#2e7d32" font-size="14" font-weight="bold">✅ Stage 3: onnxsim 简化验证</text>
  <text x="200" y="200" text-anchor="middle" fill="#333" font-size="11">onnxsim 后节点数骤降？有无融合失败的 identity/resize 残影？</text>
  <!-- Stage 4: ORT Runtime -->
  <rect x="430" y="155" width="340" height="60" rx="6" fill="url(#warnGrad)" filter="url(#shadow)"/>
  <text x="600" y="178" text-anchor="middle" fill="#f57f17" font-size="14" font-weight="bold">⚠️ Stage 4: ORT 推理一致性</text>
  <text x="600" y="200" text-anchor="middle" fill="#333" font-size="11">ONNX Runtime 推理结果与 PyTorch 输出逐元素对齐（atol=1e-4）</text>
  <!-- Arrow 2→3 -->
  <line x1="200" y1="130" x2="200" y2="155" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 3→4 -->
  <line x1="370" y1="185" x2="430" y2="185" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Stage 5: Opset -->
  <rect x="30" y="240" width="340" height="60" rx="6" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="200" y="263" text-anchor="middle" fill="#2e7d32" font-size="14" font-weight="bold">✅ Stage 5: Opset 版本检查</text>
  <text x="200" y="285" text-anchor="middle" fill="#333" font-size="11">目标国产推理引擎支持的最高 opset 版本是多少？≥ 15？</text>
  <!-- Stage 6: Custom Op -->
  <rect x="430" y="240" width="340" height="60" rx="6" fill="url(#failGrad)" filter="url(#shadow)"/>
  <text x="600" y="263" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">❌ Stage 6: 国产卡算子覆盖检查</text>
  <text x="600" y="285" text-anchor="middle" fill="#333" font-size="11">MIOpen / CANN 是否支持所有 ONNX 算子？不支持的列出来找替代方案</text>
  <!-- Arrow 4→5 -->
  <line x1="200" y1="215" x2="200" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 5→6 -->
  <line x1="370" y1="270" x2="430" y2="270" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Stage 7: Num Precision -->
  <rect x="30" y="325" width="340" height="60" rx="6" fill="url(#warnGrad)" filter="url(#shadow)"/>
  <text x="200" y="348" text-anchor="middle" fill="#f57f17" font-size="14" font-weight="bold">⚠️ Stage 7: 数值精度对齐</text>
  <text x="200" y="370" text-anchor="middle" fill="#333" font-size="11">FP32→FP16→INT8 逐级对比 RMSE/ACC 退化，找可接受的精度损失上限</text>
  <!-- Stage 8: Speed -->
  <rect x="430" y="325" width="340" height="60" rx="6" fill="url(#passGrad)" filter="url(#shadow)"/>
  <text x="600" y="348" text-anchor="middle" fill="#2e7d32" font-size="14" font-weight="bold">✅ Stage 8: 性能基准测试</text>
  <text x="600" y="370" text-anchor="middle" fill="#333" font-size="11">Warmup 5次 → 测 20 次取平均，记录 latency/throughput/显存占用</text>
  <!-- Arrow 6→7 -->
  <line x1="200" y1="300" x2="200" y2="325" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 7→8 -->
  <line x1="370" y1="355" x2="430" y2="355" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Final box -->
  <rect x="200" y="410" width="400" height="50" rx="25" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="435" text-anchor="middle" fill="white" font-size="15" font-weight="bold">🎯 全部通过 → 剪枝方案可部署到国产卡</text>
  <text x="400" y="452" text-anchor="middle" fill="#b0bec5" font-size="11">任一 Stage 失败 → 回溯调整剪枝策略或寻找算子替代方案</text>
  <!-- Arrow 8→Final -->
  <line x1="400" y1="385" x2="400" y2="410" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
