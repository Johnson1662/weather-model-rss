<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f5fb2" />
    </marker>
  </defs>
  <rect width="820" height="520" rx="12" fill="#f8fbff" />
  <text x="28" y="38" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1f2933">Day 2 · Attention 机制工作原理示意图</text>
  <text x="28" y="64" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#556068">示例 token 长度为 5，便于阅读，实际可以是千万级的长序列</text>

  <!-- Input panel -->
  <rect x="36" y="84" width="172" height="112" rx="8" fill="#e8f1ff" stroke="#a9c2ff" />
  <text x="52" y="106" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#13345a" font-weight="bold">输入序列</text>
  <text x="52" y="128" font-family="Courier New, monospace" font-size="12" fill="#1f2f49">x₁, x₂, x₃, x₄, x₅</text>
  <text x="52" y="150" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#3d4854">shape：[seq_len, D]</text>
  <text x="52" y="170" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#3d4854">每个 token 先做</text>
  <text x="52" y="186" font-family="Courier New, monospace" font-size="12" fill="#1f2f49">LayerNorm</text>
  <text x="52" y="202" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#3d4854">再做 QKV 投影</text>

  <!-- Projection block -->
  <rect x="240" y="84" width="168" height="112" rx="8" fill="#fff4e3" stroke="#ffd57e" />
  <text x="258" y="106" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#593b00" font-weight="bold">QKV 投影层</text>
  <text x="258" y="128" font-family="Courier New, monospace" font-size="12" fill="#4a3200">W_Q, W_K, W_V</text>
  <text x="258" y="146" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#48321b">输出：[seq_len, d_head]</text>
  <text x="258" y="162" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#48321b">Multi-Head：拆成 H 个头</text>
  <text x="258" y="178" font-family="Courier New, monospace" font-size="12" fill="#4a3200">Q, K, V ∈ R^(Hd)</text>
  <text x="258" y="194" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#48321b">每头只看更小的子空间 d_h</text>
  <text x="258" y="210" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#48321b">互不干扰，可并行计算</text>

  <!-- Score panel -->
  <rect x="448" y="84" width="168" height="112" rx="8" fill="#e8fff0" stroke="#88e0a0" />
  <text x="466" y="106" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#003a1c" font-weight="bold">注意力分数矩阵</text>
  <text x="466" y="128" font-family="Courier New, monospace" font-size="12" fill="#003a28">Scores = Q Kᵀ / √d</text>
  <text x="466" y="146" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#1e4a32">结果是一个 [seq, seq]</text>
  <text x="466" y="160" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#1e4a32">的矩阵：</text>
  <text x="466" y="176" font-family="Courier New, monospace" font-size="12" fill="#003a28">S[i, j] = q_i · k_j</text>
  <text x="466" y="192" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#1e4a32">S[i, j] 越大，表示</text>
  <text x="466" y="208" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#1e4a32">“i 更关注 j”</text>

  <!-- Weighted sum panel -->
  <rect x="660" y="84" width="128" height="112" rx="8" fill="#fff5ee" stroke="#ffc198" />
  <text x="674" y="106" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="13" fill="#4a1e00" font-weight="bold">加权求和输出</text>
  <text x="674" y="128" font-family="Courier New, monospace" font-size="12" fill="#4a2200">Attn = softmax(S)·V</text>
  <text x="674" y="144" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#5a3018">输出 shape 回到</text>
  <text x="674" y="158" font-family="Courier New, monospace" font-size="12" fill="#4a2200">[seq_len, d_head]</text>
  <text x="674" y="174" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#5a3018">每个位置都混入了</text>
  <text x="674" y="188" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#5a3018">其它 token 的信息</text>
  <text x="674" y="204" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#5a3018">并保留原始 shape</text>

  <!-- Arrows: normal flow -->
  <line x1="208" y1="140" x2="240" y2="140" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrowhead)" />
  <line x1="408" y1="140" x2="448" y2="140" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrowhead)" />
  <line x1="616" y1="140" x2="660" y2="140" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrowhead)" />

  <!-- Token strip -->
  <rect x="36" y="232" width="204" height="28" rx="6" fill="#e0e7ff" stroke="#9ea8ff" />
  <text x="52" y="250" font-family="Courier New, monospace" font-size="12" fill="#1f2a45">Q / K / V token 索引：t₁…t₅</text>

  <!-- Attn grid 1 -->
  <rect x="36" y="296" width="204" height="140" rx="8" fill="#fdfdff" stroke="#dde2ea" />
  <text x="52" y="314" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#3a4a58" font-weight="bold">Softmax 前的分数矩阵</text>
  <text x="52" y="336" font-family="Courier New, monospace" font-size="11" fill="#374151">         q1   q2   q3   q4   q5</text>
  <text x="52" y="354" font-family="Courier New, monospace" font-size="11" fill="#374151">k1  [  0.4  2.1  1.3  3.0 -0.4  ]</text>
  <text x="52" y="370" font-family="Courier New, monospace" font-size="11" fill="#374151">k2  [  1.9  5.3  0.8  1.7  4.5  ]</text>
  <text x="52" y="386" font-family="Courier New, monospace" font-size="11" fill="#374151">k3  [  3.4  0.9  0.5  2.6  6.7  ]</text>
  <text x="52" y="402" font-family="Courier New, monospace" font-size="11" fill="#374151">k4  [  0.6  3.3  7.1  2.4  1.2  ]</text>
  <text x="52" y="418" font-family="Courier New, monospace" font-size="11" fill="#374151">k5  [  4.6  1.4  5.8  0.1  2.3  ]</text>
  <text x="52" y="434" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="#6b7280">分数值可正可负，由余弦相似度决定</text>

  <!-- Attn grid 2 -->
  <rect x="268" y="296" width="204" height="140" rx="8" fill="#f5fff9" stroke="#7edaa2" />
  <text x="284" y="314" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#00301a" font-weight="bold">Softmax 后的权重矩阵</text>
  <text x="284" y="336" font-family="Courier New, monospace" font-size="11" fill="#065f46">实际权重，列和为 1</text>
  <text x="284" y="354" font-family="Courier New, monospace" font-size="11" fill="#065f46">         q1     q2    q3    q4    q5</text>
  <text x="284" y="370" font-family="Courier New, monospace" font-size="11" fill="#065f46">k1  [ 0.06  0.35  0.12  0.45  0.02 ]</text>
  <text x="284" y="386" font-family="Courier New, monospace" font-size="11" fill="#065f46">k2  [ 0.10  0.51  0.05  0.14  0.20 ]</text>
  <text x="284" y="402" font-family="Courier New, monospace" font-size="11" fill="#065f46">k3  [ 0.28  0.04  0.02  0.15  0.51 ]</text>
  <text x="284" y="418" font-family="Courier New, monospace" font-size="11" fill="#065f46">k4  [ 0.02  0.18  0.69  0.10  0.01 ]</text>
  <text x="284" y="434" font-family="Courier New, monospace" font-size="11" fill="#065f46">k5  [ 0.39  0.04  0.50  0.01  0.06 ]</text>

  <!-- Output panel -->
  <rect x="500" y="296" width="288" height="140" rx="8" fill="#fff8f0" stroke="#ffb875" />
  <text x="516" y="314" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a2800" font-weight="bold">加权求和结果（以 q2 为例）</text>
  <text x="516" y="332" font-family="Courier New, monospace" font-size="12" fill="#4a2200">out₂ = 0.35·V₁ + 0.51·V₂</text>
  <text x="516" y="350" font-family="Courier New, monospace" font-size="12" fill="#4a2200">      + 0.05·V₃ + ...</text>
  <text x="516" y="370" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">结果中 V₅ 的权重为 0.20，</text>
  <text x="516" y="386" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">说明 q2 仍然参考了</text>
  <text x="516" y="402" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">第 5 个 token 的信息。</text>
  <text x="516" y="418" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">这就是“自注意力”的含义：</text>
  <text x="516" y="434" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">每个输出都是全体输入的</text>
  <text x="516" y="450" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="12" fill="#4a3818">加权平均，但权重各不相同。</text>
  <line x1="472" y1="368" x2="500" y2="368" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arrowhead)" />

  <!-- Math formula box -->
  <rect x="36" y="460" width="752" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe" />
  <text x="52" y="482" font-family="Courier New, monospace" font-size="12" fill="#1e1b4b">公式：Attention(Q, K, V) = softmax( Q·Kᵀ / √d_head ) · V</text>
  <text x="52" y="498" font-family="SimHei, Microsoft YaHei, sans-serif" font-size="11" fill="#312e81">√d_head 的意义：把方差拉回到合理范围，防止 softmax 把分数挤压到极值，导致梯度消失。</text>
</svg>