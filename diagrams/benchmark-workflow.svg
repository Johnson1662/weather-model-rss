<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="font-family: 'Segoe UI', system-ui, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1565C0"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#152238;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00838F"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
    <linearGradient id="metric1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <linearGradient id="metric2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A1B9A"/>
      <stop offset="100%" style="stop-color:#4A148C"/>
    </linearGradient>
    <linearGradient id="metric3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF6C00"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold">推理引擎 Benchmark 工作流</text>

  <!-- Step 1: 定义评测目标 -->
  <rect x="40" y="55" width="190" height="56" rx="10" fill="url(#box1)"/>
  <text x="135" y="76" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">Step 1</text>
  <text x="135" y="96" text-anchor="middle" fill="#B3E5FC" font-size="12">定义评测目标</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="83" x2="275" y2="83" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: 选择测试场景 -->
  <rect x="285" y="55" width="190" height="56" rx="10" fill="url(#box2)"/>
  <text x="380" y="76" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">Step 2</text>
  <text x="380" y="96" text-anchor="middle" fill="#B2EBF2" font-size="12">选择测试场景</text>

  <!-- Arrow 2→3 -->
  <line x1="475" y1="83" x2="520" y2="83" stroke="#00838F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: 运行 Benchmark -->
  <rect x="530" y="55" width="190" height="56" rx="10" fill="url(#box3)"/>
  <text x="625" y="76" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">Step 3</text>
  <text x="625" y="96" text-anchor="middle" fill="#C8E6C9" font-size="12">运行 Benchmark</text>

  <!-- Arrow 3→分析 -->
  <line x1="625" y1="111" x2="625" y2="140" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 分析结果 -->
  <rect x="440" y="145" width="280" height="40" rx="8" fill="#1B5E20" opacity="0.7"/>
  <text x="580" y="170" text-anchor="middle" fill="#C8E6C9" font-size="13">分析结果 → 迭代优化</text>

  <!-- Arrow back -->
  <line x1="440" y1="165" x2="180" y2="165" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- 三要素标题 -->
  <text x="50" y="210" fill="#90CAF9" font-size="14" font-weight="bold">▸ 评测三要素</text>

  <!-- 要素卡片 -->
  <rect x="40" y="222" width="225" height="105" rx="8" fill="#0D2137" stroke="#1565C0" stroke-width="1"/>
  <circle cx="60" cy="244" r="10" fill="#1565C0"/>
  <text x="60" y="248" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">1</text>
  <text x="80" y="248" fill="#FFF" font-size="13" font-weight="bold">预热 (Warm-up)</text>
  <text x="60" y="270" fill="#90CAF9" font-size="11">GPU 最初几轮推理有冷启动开销</text>
  <text x="60" y="286" fill="#90CAF9" font-size="11">（驱动初始化、缓存填充、cuBLAS</text>
  <text x="64" y="302" fill="#90CAF9" font-size="11">启发式空间搜索）</text>
  <text x="60" y="318" fill="#E57373" font-size="11">标准：至少 10-30 轮 warm-up</text>

  <rect x="287" y="222" width="225" height="105" rx="8" fill="#0D2137" stroke="#00838F" stroke-width="1"/>
  <circle cx="307" cy="244" r="10" fill="#00838F"/>
  <text x="307" y="248" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">2</text>
  <text x="327" y="248" fill="#FFF" font-size="13" font-weight="bold">Batch Size</text>
  <text x="307" y="270" fill="#80DEEA" font-size="11">Batch=1 反映真实延迟</text>
  <text x="307" y="286" fill="#80DEEA" font-size="11">Batch=4/8 测吞吐上限</text>
  <text x="307" y="302" fill="#80DEEA" font-size="11">评估时需要区分单帧延迟</text>
  <text x="311" y="318" fill="#E57373" font-size="11">和大批量吞吐能力</text>

  <rect x="535" y="222" width="225" height="105" rx="8" fill="#0D2137" stroke="#2E7D32" stroke-width="1"/>
  <circle cx="555" cy="244" r="10" fill="#2E7D32"/>
  <text x="555" y="248" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">3</text>
  <text x="575" y="248" fill="#FFF" font-size="13" font-weight="bold">统计稳定性</text>
  <text x="555" y="270" fill="#A5D6A7" font-size="11">单次推理不可信</text>
  <text x="555" y="286" fill="#A5D6A7" font-size="11">重复至少 100 次以上</text>
  <text x="555" y="302" fill="#A5D6A7" font-size="11">报告均值、中位数、P99</text>
  <text x="559" y="318" fill="#E57373" font-size="11">剔除前 N 次 (warm-up)</text>

  <!-- 指标标题 -->
  <text x="50" y="360" fill="#CE93D8" font-size="14" font-weight="bold">▸ 核心指标</text>

  <!-- Latency card -->
  <rect x="40" y="372" width="165" height="88" rx="8" fill="url(#metric1)" opacity="0.9"/>
  <text x="122" y="396" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">延迟 (Latency)</text>
  <text x="60" y="416" fill="#FFE0B2" font-size="11">单次推理从输入到输出</text>
  <text x="60" y="434" fill="#FFE0B2" font-size="11">的时间，单位 ms</text>
  <text x="60" y="452" fill="#FFF" font-size="11" font-weight="bold">比赛关注：响应速度</text>

  <!-- Throughput card -->
  <rect x="225" y="372" width="165" height="88" rx="8" fill="url(#metric2)" opacity="0.9"/>
  <text x="307" y="396" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">吞吐 (Throughput)</text>
  <text x="245" y="416" fill="#E1BEE7" font-size="11">单位时间处理的样本数</text>
  <text x="245" y="434" fill="#E1BEE7" font-size="11">单位：样本/秒</text>
  <text x="245" y="452" fill="#FFF" font-size="11" font-weight="bold">比赛关注：处理效率</text>

  <!-- 权衡箭头 -->
  <text x="410" y="400" fill="#FFCC02" font-size="22" font-weight="bold">⇄</text>
  <text x="400" y="425" fill="#FFCC02" font-size="10" text-anchor="middle">权衡</text>
  <text x="400" y="440" fill="#FFCC02" font-size="10" text-anchor="middle">Trade-off</text>

  <!-- Profiler card -->
  <rect x="515" y="372" width="245" height="88" rx="8" fill="#37474F" stroke="#FFCC02" stroke-width="1.5"/>
  <text x="637" y="396" text-anchor="middle" fill="#FFCC02" font-size="13" font-weight="bold">🔍 PyTorch Profiler</text>
  <text x="530" y="416" fill="#B0BEC5" font-size="11">▸ 热点算子排名（谁最慢）</text>
  <text x="530" y="434" fill="#B0BEC5" font-size="11">▸ GPU Kernel 时间线（空闲？过载？）</text>
  <text x="530" y="452" fill="#B0BEC5" font-size="11">▸ CPU↔GPU 同步开销分析</text>
</svg>