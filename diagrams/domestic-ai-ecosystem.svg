<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">国产智算平台软件栈全景图</text>
  <line x1="200" y1="48" x2="600" y2="48" stroke="#475569" stroke-width="1"/>

  <!-- Layer 1: Hardware - bottom -->
  <rect x="50" y="520" width="700" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="546" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="bold">硬件层（AI 加速卡）</text>
  <text x="140" y="566" text-anchor="middle" fill="#fca5a5" font-size="11">华为昇腾 910B</text>
  <text x="310" y="566" text-anchor="middle" fill="#93c5fd" font-size="11">海光 DCU Z100</text>
  <text x="470" y="566" text-anchor="middle" fill="#86efac" font-size="11">寒武纪思元 590</text>
  <text x="640" y="566" text-anchor="middle" fill="#c4b5fd" font-size="11">摩尔线程 S5000</text>

  <!-- Arrow -->
  <line x1="400" y1="520" x2="400" y2="500" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Driver/Runtime -->
  <rect x="50" y="440" width="700" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="466" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">驱动 / 运行时层</text>
  <text x="180" y="488" text-anchor="middle" fill="#fca5a5" font-size="11">CANN Driver</text>
  <text x="350" y="488" text-anchor="middle" fill="#93c5fd" font-size="11">DTK Runtime / ROCm</text>
  <text x="540" y="488" text-anchor="middle" fill="#86efac" font-size="11">Neuware Driver</text>
  <text x="690" y="488" text-anchor="middle" fill="#c4b5fd" font-size="11">MUSA Driver</text>

  <!-- Arrow -->
  <line x1="400" y1="440" x2="400" y2="420" stroke="#475569" stroke-width="2"/>

  <!-- Layer 3: Compute Library -->
  <rect x="50" y="360" width="700" height="60" rx="8" fill="#1a3a1a" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="386" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">算子库层（Compute Library）</text>
  <text x="100" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocBLAS</text>
  <text x="175" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocFFT</text>
  <text x="250" y="408" text-anchor="middle" fill="#86efac" font-size="10">MIOpen</text>
  <text x="335" y="408" text-anchor="middle" fill="#86efac" font-size="10">RCCL</text>
  <text x="410" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocSPARSE</text>
  <text x="510" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocThrust</text>
  <text x="600" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocPRIM</text>
  <text x="690" y="408" text-anchor="middle" fill="#86efac" font-size="10">rocRAND</text>

  <!-- Arrow -->
  <line x1="400" y1="360" x2="400" y2="340" stroke="#475569" stroke-width="2"/>

  <!-- Layer 4: Framework Adapter -->
  <rect x="50" y="280" width="700" height="60" rx="8" fill="#3b1a3b" stroke="#a855f7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="306" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">框架适配层</text>
  <text x="160" y="328" text-anchor="middle" fill="#fca5a5" font-size="12">torch_npu</text>
  <text x="400" y="328" text-anchor="middle" fill="#93c5fd" font-size="12">PyTorch for ROCm (hipify)</text>
  <text x="620" y="328" text-anchor="middle" fill="#86efac" font-size="12">MagicMind</text>

  <!-- Arrow -->
  <line x1="400" y1="280" x2="400" y2="260" stroke="#475569" stroke-width="2"/>

  <!-- Layer 5: Model/Inference Engine -->
  <rect x="50" y="200" width="700" height="60" rx="8" fill="#3b2a0a" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="226" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="bold">模型推理层</text>
  <text x="180" y="248" text-anchor="middle" fill="#fde68a" font-size="11">CANN (ACL) / MindSpore</text>
  <text x="400" y="248" text-anchor="middle" fill="#fde68a" font-size="11">ONNX Runtime ROCm EP</text>
  <text x="620" y="248" text-anchor="middle" fill="#fde68a" font-size="11">vLLM / TGI</text>

  <!-- Arrow -->
  <line x1="400" y1="200" x2="400" y2="180" stroke="#475569" stroke-width="2"/>

  <!-- Layer 6: Optimization Tools (top) -->
  <rect x="50" y="120" width="700" height="60" rx="8" fill="#2a1a1a" stroke="#ef4444" stroke-width="1.5" filter="url(#glow)"/>
  <text x="400" y="146" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">优化工具层</text>
  <text x="155" y="168" text-anchor="middle" fill="#fca5a5" font-size="11">ATC (模型转换)</text>
  <text x="340" y="168" text-anchor="middle" fill="#fca5a5" font-size="11">hipify (代码转换)</text>
  <text x="510" y="168" text-anchor="middle" fill="#fca5a5" font-size="11">onnxsim (图优化)</text>
  <text x="660" y="168" text-anchor="middle" fill="#fca5a5" font-size="11">Profiler</text>

  <!-- Side annotations -->
  <rect x="50" y="62" width="700" height="45" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="90" text-anchor="middle" fill="#94a3b8" font-size="12">先导杯气象大模型部署流程：PyTorch → ONNX → 图优化 → 国产推理引擎 → DCU 推理</text>

  <!-- Legend box -->
  <rect x="610" y="520" width="140" height="65" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="615" y="538" fill="#94a3b8" font-size="9">图例</text>
  <rect x="615" y="544" width="10" height="10" rx="2" fill="#fca5a5"/>
  <text x="630" y="554" fill="#fca5a5" font-size="9">华为昇腾</text>
  <rect x="615" y="558" width="10" height="10" rx="2" fill="#93c5fd"/>
  <text x="630" y="568" fill="#93c5fd" font-size="9">海光 DCU</text>
  <rect x="700" y="544" width="10" height="10" rx="2" fill="#86efac"/>
  <text x="715" y="554" fill="#86efac" font-size="9">寒武纪</text>
  <rect x="700" y="558" width="10" height="10" rx="2" fill="#c4b5fd"/>
  <text x="715" y="568" fill="#c4b5fd" font-size="9">摩尔线程</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
  </defs>
</svg>