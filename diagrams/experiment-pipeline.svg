<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="box5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="url(#bg)" rx="12"/>
  <text x="450" y="40" text-anchor="middle" fill="#e0e0ff" font-size="20" font-weight="bold">实验管线设计 — 多维度排列组合自动化</text>
  
  <!-- Pipeline boxes -->
  <rect x="50" y="70" width="160" height="65" rx="10" fill="url(#box1)" opacity="0.9"/>
  <text x="130" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">原始权重</text>
  <text x="130" y="118" text-anchor="middle" fill="#eee" font-size="11">Pangu-Weather .pth</text>
  
  <line x1="210" y1="102" x2="258" y2="102" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="268" y="70" width="160" height="65" rx="10" fill="url(#box2)" opacity="0.9"/>
  <text x="348" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">结构化剪枝</text>
  <text x="348" y="118" text-anchor="middle" fill="#eee" font-size="11">Head/Channel 裁剪</text>
  
  <line x1="428" y1="102" x2="476" y2="102" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="486" y="70" width="160" height="65" rx="10" fill="url(#box3)" opacity="0.9"/>
  <text x="566" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">量化压缩</text>
  <text x="566" y="118" text-anchor="middle" fill="#eee" font-size="11">FP16 / INT8 / SmoothQuant</text>
  
  <line x1="646" y1="102" x2="694" y2="102" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="704" y="70" width="160" height="65" rx="10" fill="url(#box4)" opacity="0.9"/>
  <text x="784" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">ONNX 导出</text>
  <text x="784" y="118" text-anchor="middle" fill="#eee" font-size="11">opset=15 + onnxsim</text>
  
  <!-- 2nd row -->
  <rect x="268" y="170" width="160" height="65" rx="10" fill="url(#box5)" opacity="0.9"/>
  <text x="348" y="198" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">国产卡推理</text>
  <text x="348" y="218" text-anchor="middle" fill="#eee" font-size="11">Latency / Throughput</text>
  
  <line x1="348" y1="135" x2="348" y2="170" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="486" y="170" width="160" height="65" rx="10" fill="url(#box1)" opacity="0.9"/>
  <text x="566" y="198" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">精度验证</text>
  <text x="566" y="218" text-anchor="middle" fill="#eee" font-size="11">RMSE / ACC 计算</text>
  
  <line x1="428" y1="202" x2="486" y2="202" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Experiment tracking box big -->
  <rect x="50" y="280" width="800" height="140" rx="12" fill="#1e1e3f" stroke="#667eea" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.8"/>
  <text x="450" y="308" text-anchor="middle" fill="#a8b4ff" font-size="15" font-weight="bold">📋 实验跟踪表（experiments.json）</text>
  
  <!-- Table header -->
  <rect x="80" y="322" width="740" height="28" rx="4" fill="#2a2a5a" opacity="0.9"/>
  <text x="100" y="341" fill="#8af" font-size="11" font-weight="bold">实验ID</text>
  <text x="200" y="341" fill="#8af" font-size="11" font-weight="bold">剪枝率</text>
  <text x="300" y="341" fill="#8af" font-size="11" font-weight="bold">量化</text>
  <text x="400" y="341" fill="#8af" font-size="11" font-weight="bold">参数量</text>
  <text x="500" y="341" fill="#8af" font-size="11" font-weight="bold">延迟(ms)</text>
  <text x="600" y="341" fill="#8af" font-size="11" font-weight="bold">RMSE↓</text>
  <text x="700" y="341" fill="#8af" font-size="11" font-weight="bold">状态</text>
  
  <!-- Table rows -->
  <text x="100" y="367" fill="#ddd" font-size="11">exp_001</text>
  <text x="200" y="367" fill="#ddd" font-size="11">10% head</text>
  <text x="300" y="367" fill="#ddd" font-size="11">PTQ INT8</text>
  <text x="400" y="367" fill="#ddd" font-size="11">58M</text>
  <text x="500" y="367" fill="#ddd" font-size="11">420</text>
  <text x="600" y="367" fill="#8f8" font-size="11">0.0035</text>
  <text x="700" y="367" fill="#4a4" font-size="11">✅</text>
  
  <text x="100" y="387" fill="#ddd" font-size="11">exp_002</text>
  <text x="200" y="387" fill="#ddd" font-size="11">20% head</text>
  <text x="300" y="387" fill="#ddd" font-size="11">SQ INT8</text>
  <text x="400" y="387" fill="#ddd" font-size="11">52M</text>
  <text x="500" y="387" fill="#ddd" font-size="11">380</text>
  <text x="600" y="387" fill="#ff8" font-size="11">0.0042</text>
  <text x="700" y="387" fill="#4a4" font-size="11">✅</text>
  
  <text x="100" y="407" fill="#ddd" font-size="11">exp_003</text>
  <text x="200" y="407" fill="#ddd" font-size="11">30% head</text>
  <text x="300" y="407" fill="#ddd" font-size="11">SQ INT8</text>
  <text x="400" y="407" fill="#ddd" font-size="11">46M</text>
  <text x="500" y="407" fill="#ddd" font-size="11">340</text>
  <text x="600" y="407" fill="#f88" font-size="11">0.0058</text>
  <text x="700" y="407" fill="#a44" font-size="11">⚠️</text>
  
  <!-- Decision flow -->
  <line x1="450" y1="420" x2="450" y2="458" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="280" y="465" width="340" height="50" rx="25" fill="url(#box4)" opacity="0.9" filter="url(#glow)"/>
  <text x="450" y="490" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">🏆 选择最佳模型 → 打包提交</text>
  
  <line x1="450" y1="515" x2="450" y2="545" stroke="#aaa" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="200" y="550" width="500" height="35" rx="8" fill="#2a2a5a" stroke="#43e97b" stroke-width="1"/>
  <text x="450" y="573" text-anchor="middle" fill="#8f8" font-size="13">提交包: model.onnx + inference.py + requirements.txt + README.md</text>
</svg>