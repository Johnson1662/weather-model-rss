<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Microsoft YaHei', -apple-system, sans-serif">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#ce93d8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">Pangu-Weather 3D Earth-Specific Transformer 架构总览</text>

  <!-- ========== Step 1: Input ========== -->
  <rect x="350" y="60" width="500" height="80" rx="10" fill="url(#grad1)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1">输入：气象再分析数据</text>
  <text x="600" y="108" text-anchor="middle" font-size="13" fill="#333">张量形状 [B, C, H=721, W=1440, P=4/13]</text>
  <text x="600" y="126" text-anchor="middle" font-size="12" fill="#666">变量：位势高度 / 温度 / 风场分量 / 湿度 / 海平面气压</text>

  <!-- Arrow 1 -->
  <line x1="600" y1="140" x2="600" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== Step 2: Patch Embedding ========== -->
  <rect x="350" y="175" width="500" height="70" rx="10" fill="url(#grad2)" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">3D Patch Embedding</text>
  <text x="600" y="222" text-anchor="middle" font-size="12" fill="#333">3D Conv(k=2,s=2) → LayerNorm → Flatten</text>
  <text x="600" y="238" text-anchor="middle" font-size="11" fill="#666">输入 5D → 输出 Token序列 [B, L=H/2×W/2×P/2, D]</text>

  <!-- Arrow 2 -->
  <line x1="600" y1="245" x2="600" y2="275" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== Step 3: Stage 1 ========== -->
  <rect x="350" y="280" width="500" height="80" rx="10" fill="url(#grad3)" stroke="#ef6c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="305" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Stage 1：浅层特征提取</text>
  <text x="600" y="325" text-anchor="middle" font-size="12" fill="#333">2x 3D Transformer Block（3D窗口注意力 + MLP）</text>
  <text x="600" y="343" text-anchor="middle" font-size="11" fill="#666">窗口大小 8×8×4 | 多头注意力 H=16</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="360" x2="600" y2="385" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!--中间下采样标注-->
  <rect x="520" y="385" width="160" height="25" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="402" text-anchor="middle" font-size="11" fill="#666">3D下采样（分辨率减半，通道翻倍）</text>

  <!-- Arrow 4 -->
  <line x1="600" y1="410" x2="600" y2="435" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== Step 4: Stage 2 ========== -->
  <rect x="350" y="440" width="500" height="65" rx="10" fill="url(#grad3)" stroke="#ef6c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="463" text-anchor="middle" font-size="15" font-weight="bold" fill="#e65100">Stage 2：中层特征提取</text>
  <text x="600" y="483" text-anchor="middle" font-size="12" fill="#333">2x 3D Transformer Block | 窗口大小 4×4×2 | H=32</text>

  <!-- Arrow 5 -->
  <line x1="600" y1="505" x2="600" y2="530" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!--中间下采样标注-->
  <rect x="520" y="530" width="160" height="25" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="547" text-anchor="middle" font-size="11" fill="#666">3D下采样（分辨率减半，通道翻倍）</text>

  <!-- Arrow 6 -->
  <line x1="600" y1="555" x2="600" y2="577" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== Step 5: Stage 3+4 ========== -->
  <rect x="350" y="580" width="500" height="65" rx="10" fill="url(#grad4)" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="603" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">Stage 3 + Stage 4：深层语义提取</text>
  <text x="600" y="623" text-anchor="middle" font-size="12" fill="#333">各 6x 3D Transformer Block | 窗口大小 4×4×2 | H=64</text>

  <!-- Arrow 7 -->
  <line x1="600" y1="645" x2="600" y2="663" stroke="#555" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ========== Output ========== -->
  <rect x="350" y="665" width="500" height="30" rx="8" fill="url(#grad5)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="600" y="684" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">输出 → 气象变量预测</text>
</svg>
