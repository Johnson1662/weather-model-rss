<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background:#1a1a2e;border-radius:12px;font-family:'Segoe UI',Arial,sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#e94560"/>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#4ecca3"/>
    <linearGradient id="box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#3d2363"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecca3"/>
      <stop offset="100%" stop-color="#36a37e"/>
    </linearGradient>
    <linearGradient id="result" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="arrowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">算子融合原理：将多个小算子合并为一个大算子</text>
  <text x="400" y="60" text-anchor="middle" fill="#8888aa" font-size="13">减少 Kernel Launch 开销 + 提升访存局部性</text>

  <!-- Before: 未融合 -->
  <text x="200" y="95" text-anchor="middle" fill="#aaaacc" font-size="14" font-weight="bold">⬅ 融合前 (三个独立 Kernel)</text>

  <!-- Mul -->
  <rect x="80" y="110" width="240" height="50" rx="8" fill="url(#box1)" opacity="0.9"/>
  <text x="200" y="126" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Kernel 1: Mul</text>
  <text x="200" y="144" text-anchor="middle" fill="#ffcccc" font-size="10">计算: X = A * B</text>
  <text x="95" y="110" fill="#aaaacc" font-size="10">①</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="160" x2="200" y2="185" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="176" fill="#e94560" font-size="9">读/写显存</text>

  <!-- Add -->
  <rect x="80" y="190" width="240" height="50" rx="8" fill="url(#box2)" opacity="0.9"/>
  <text x="200" y="206" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Kernel 2: Add</text>
  <text x="200" y="224" text-anchor="middle" fill="#ccbbff" font-size="10">计算: Y = X + C</text>
  <text x="95" y="190" fill="#aaaacc" font-size="10">②</text>

  <!-- Arrow 2 -->
  <line x1="200" y1="240" x2="200" y2="265" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="256" fill="#e94560" font-size="9">读/写显存</text>

  <!-- Relu -->
  <rect x="80" y="270" width="240" height="50" rx="8" fill="url(#box2)" opacity="0.9"/>
  <text x="200" y="286" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Kernel 3: Relu</text>
  <text x="200" y="304" text-anchor="middle" fill="#ccbbff" font-size="10">计算: Z = max(0, Y)</text>
  <text x="95" y="270" fill="#aaaacc" font-size="10">③</text>

  <!-- Arrow 3 -->
  <line x1="200" y1="320" x2="200" y2="345" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="336" fill="#e94560" font-size="9">三次显存读写</text>

  <!-- 缺点 -->
  <text x="200" y="365" text-anchor="middle" fill="#ff6666" font-size="11">⚠ 3 次 Kernel Launch + 3 次显存读写</text>

  <!-- ==== VS ==== -->
  <text x="400" y="230" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="bold">⟹</text>
  <text x="400" y="252" text-anchor="middle" fill="#ffd700" font-size="13">等价变换</text>

  <!-- After: 融合 -->
  <text x="610" y="95" text-anchor="middle" fill="#aaaacc" font-size="14" font-weight="bold">➡ 融合后 (一个 Fusion Kernel)</text>

  <rect x="490" y="110" width="240" height="210" rx="12" fill="url(#box3)" opacity="0.2" stroke="#4ecca3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="610" y="130" text-anchor="middle" fill="#4ecca3" font-size="12" font-weight="bold">Fusion Kernel: MulAddRelu</text>
  <text x="610" y="148" text-anchor="middle" fill="#99ddbb" font-size="10">在一个 kernel 内完成</text>

  <rect x="510" y="160" width="200" height="30" rx="6" fill="url(#box1)" opacity="0.9"/>
  <text x="610" y="180" text-anchor="middle" fill="#fff" font-size="11">Mul: A * B → X</text>

  <line x1="610" y1="190" x2="610" y2="198" stroke="#4ecca3" stroke-width="1"/>

  <rect x="510" y="200" width="200" height="30" rx="6" fill="url(#box2)" opacity="0.9"/>
  <text x="610" y="220" text-anchor="middle" fill="#fff" font-size="11">Add: X + C → Y</text>

  <line x1="610" y1="230" x2="610" y2="238" stroke="#4ecca3" stroke-width="1"/>

  <rect x="510" y="240" width="200" height="30" rx="6" fill="url(#box1)" opacity="0.9"/>
  <text x="610" y="260" text-anchor="middle" fill="#fff" font-size="11">Relu: max(0, Y) → Z</text>

  <rect x="510" y="290" width="200" height="30" rx="6" fill="url(#result)" opacity="0.9"/>
  <text x="610" y="310" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">结果: 全部留在寄存器/共享内存</text>

  <text x="610" y="365" text-anchor="middle" fill="#4ecca3" font-size="11">✅ 1 次 Kernel Launch + 0 次中间显存读写</text>

  <!-- Bottom explanation -->
  <rect x="80" y="390" width="650" height="90" rx="10" fill="#16213e" stroke="#334" stroke-width="1"/>
  <text x="100" y="412" fill="#ffd700" font-size="12" font-weight="bold">🎯 融合的核心收益：</text>
  <text x="100" y="432" fill="#ccccee" font-size="11">1. 减少 Kernel Launch 次数：GPU 启动一次 kernel 开销约 3-10μs，批量融合后次数大减</text>
  <text x="100" y="452" fill="#ccccee" font-size="11">2. 消除中间结果显存读写：Mul 的输出直接留在寄存器传给 Add，无需写回全局显存</text>
  <text x="100" y="472" fill="#ccccee" font-size="11">3. 编译器可做更多局部优化：循环展开、指令级并行等</text>
</svg>
